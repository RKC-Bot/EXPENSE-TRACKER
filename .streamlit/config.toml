[server]
headless = false
port = 8501
runOnSave = true
enableCORS = false
enableXsrfProtection = true

[client]
showErrorDetails = true
toolbarMode = "developer"

[logger]
level = "info"

[theme]
base = "light"
primaryColor = "#1f77b4"

[browser]
serverAddress = "localhost"
gatherUsageStats = false

[client.toolbarMode]
development = true

[logger]
messageFormat = "%(asctime)s.%(msecs)03d [%(levelname)s] %(message)s"
